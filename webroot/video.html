<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>视频流传输测试</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .control-panel { margin-bottom: 20px; }
        select { padding: 8px; font-size: 14px; border-radius: 4px; border: 1px solid #dcdde1; }
        button { padding: 8px 15px; background-color: #4CAF50; color: white; border: none; border-radius: 4px; cursor: pointer; transition: 0.2s; }
        button:hover { background-color: #45a049; }
    </style>
</head>
<body>
    <div class="navbar">
        <a href="index.html">首页</a>
        <a href="text.html">文本测试</a>
        <a href="image.html">图片测试</a>
        <a href="video.html">视频测试</a>
    </div>

    <div class="container">
        <h2>多视频切换播放测试</h2>
        <p>选择不同的视频文件进行请求。你的服务器以 <code>rb</code> 模式读取二进制流，完全支持视频的平滑切换与播放。</p>
        
        <div class="media-box">
            <div class="control-panel">
                <select id="videoSelector">
                    <option value="test.mp4">测试视频 1 (test.mp4)</option>
                    <option value="course.mp4">课程录像片段 (course.mp4)</option>
                    <option value="demo.webm">WebM格式视频 (demo.webm)</option>
                </select>
                <button type="button" onclick="loadVideo()">加载并播放</button>
            </div>

            <video id="videoEl" width="100%" height="300" controls style="background-color: #000;">
                <source id="videoSource" src="" type="video/mp4">
                您的浏览器不支持 HTML5 视频标签。
            </video>
            <p id="statusText" style="color: #7f8fa6; font-size: 14px; margin-top: 10px;">等待请求...</p>
        </div>

        <a href="index.html" class="back-link">← 返回首页</a>
    </div>

    <script>
        function loadVideo() {
            var selector = document.getElementById('videoSelector');
            var selectedFile = selector.value;
            var video = document.getElementById('videoEl');
            var source = document.getElementById('videoSource');
            var status = document.getElementById('statusText');

            // 更改 source 的 src
            source.src = selectedFile;
            
            // 如果视频格式不同，最好也动态修改 type
            if(selectedFile.endsWith('.webm')) {
                source.type = 'video/webm';
            } else {
                source.type = 'video/mp4';
            }

            // 视频元素必须调用 load() 方法才能重新发起 HTTP 请求获取新视频
            video.load();
            video.play(); // 可选：加载后自动播放
            
            status.innerText = "当前请求: GET /" + selectedFile;
        }
    </script>
</body>
</html>
