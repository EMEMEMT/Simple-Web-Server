<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>404 Not Found</title>
  <style>
    body{
      margin:0;
      font-family: Arial, Helvetica, sans-serif;
      background:#0f172a;
      color:#e2e8f0;
      display:flex;
      align-items:center;
      justify-content:center;
      min-height:100vh;
    }
    .card{
      width:min(720px, 92vw);
      background:#111827;
      border:1px solid rgba(255,255,255,0.08);
      border-radius:16px;
      padding:32px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.35);
    }
    h1{
      margin:0 0 10px 0;
      font-size:56px;
      line-height:1;
      color:#f97316;
    }
    p{
      margin:0 0 20px 0;
      color:#cbd5e1;
      font-size:16px;
    }
    .meta{
      margin-top:18px;
      padding-top:18px;
      border-top:1px solid rgba(255,255,255,0.08);
      font-size:14px;
      color:#94a3b8;
    }
    a{
      display:inline-block;
      margin-top:12px;
      color:#60a5fa;
      text-decoration:none;
    }
    a:hover{ text-decoration:underline; }
  </style>
</head>
<body>
  <div class="card">
    <h1>404</h1>
    <p>The page you requested could not be found. Please check the URL and try again.</p>
    <a href="/index.html">Return to Home</a>
    <div class="meta">
      <div>HTTP Status: 404 Not Found</div>
      <div>Tip: Try requesting <code>/index.html</code></div>
    </div>
  </div>
</body>
</html>
