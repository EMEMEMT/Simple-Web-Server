<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 Not Found - Simple Web Server</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* 仅在404页面局部使用的微调样式，保持整体风格一致 */
        .error-container {
            text-align: center;
            padding: 40px 20px;
        }
        .error-code {
            font-size: 80px;
            color: #e74c3c; /* 使用柔和的红色作为警示 */
            margin: 0;
            line-height: 1;
        }
        .error-desc {
            font-size: 18px;
            color: #7f8fa6;
            margin-bottom: 30px;
        }
        .meta-info {
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px dashed #dcdde1;
            color: #a4b0be;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="navbar">
        <a href="index.html">首页</a>
        <a href="text.html">文本测试</a>
        <a href="image.html">图片测试</a>
        <a href="video.html">视频测试</a>
    </div>

    <div class="container error-container">
        <h1 class="error-code">404</h1>
        <h2>页面未找到 (Not Found)</h2>
        <p class="error-desc">抱歉，服务器上不存在你请求的资源。<br>请检查 URL 是否拼写正确，或者该文件是否位于 webroot 目录下。</p>
        
        <a href="index.html" class="nav-btn" style="display: inline-block; width: auto; padding: 12px 30px;">← 返回首页</a>

        <div class="meta-info">
            <div>HTTP Status: 404 Not Found</div>
            <div>Tip: 请尝试访问 <code>/index.html</code></div>
        </div>
    </div>
</body>
</html>
